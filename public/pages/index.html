<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Placita — Ingresar</title>
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .auth-box { background:var(--surface); border:1.5px solid var(--border); border-radius:20px; padding:40px; width:380px; max-width:95vw; box-shadow:var(--shadow-lg); }
    .auth-logo { text-align:center; margin-bottom:32px; }
    .auth-logo .emoji { font-size:52px; display:block; margin-bottom:10px; }
    .auth-logo h1 { font-family:var(--serif); font-size:32px; font-weight:900; color:var(--green); }
    .auth-logo p { color:var(--text-muted); font-size:13px; margin-top:4px; }
    .auth-tabs { display:flex; gap:4px; background:var(--card); border-radius:var(--radius-sm); padding:4px; margin-bottom:24px; border:1px solid var(--border); }
    .auth-tab { flex:1; padding:8px; border-radius:6px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; font-size:13px; font-weight:600; font-family:var(--sans); transition:var(--transition); }
    .auth-tab.active { background:var(--surface); color:var(--green); box-shadow:0 1px 4px rgba(0,0,0,0.1); }
    .auth-form { display:flex; flex-direction:column; gap:14px; }
  </style>
</head>
<body>
  <div class="auth-box">
     <div class="auth-logo">
      <span class="emoji">🍉🌿🧺</span>
      <h2>Placita</h2>
      <h1>Frutos De Mi Campo</h1>
      <h2>🐮 Sistema de ventas 💸</h2>
    </div>
    <div id="form-login" class="auth-form">
      <div class="form-group"><label>Usuario</label><input type="text" id="login-username" placeholder="Tu nombre o código" autocomplete="username" /></div>
      <div class="form-group"><label>Contraseña o PIN</label><input type="password" id="login-password" placeholder="PIN o contraseña" autocomplete="current-password" /></div>
      <div id="login-error" class="msg-error"></div>
      <button id="btn-login" class="btn btn-primary btn-full btn-lg" onclick="authPage.login()">Ingresar</button>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted)">
      🔒 Acceso solo por invitación del administrador
    </div>
  </div>
  <div id="toast"></div>
  <script src="/js/ApiClient.js"></script><script src="/js/auth.js"></script>
</body></html>
